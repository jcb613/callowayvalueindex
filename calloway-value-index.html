<!DOCTYPE html>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
--bg-primary:#0a0b0f;--bg-secondary:#12131a;--bg-tertiary:#1a1b25;--bg-card:#161722;
--bg-hover:#1e1f2e;--border:#2a2b3a;--border-light:#3a3b4a;
--text-primary:#e8e9f0;--text-secondary:#9a9bb0;--text-muted:#5a5b70;
--accent-gold:#f0c040;--accent-orange:#ff6b35;--accent-red:#e63946;
--accent-pink:#d62246;--accent-purple:#7b68ee;--accent-blue:#4a6fa5;
--accent-cyan:#2d9cdb;--accent-green:#27ae60;--accent-gray:#6b7280;
--qb-color:#e63946;--rb-color:#2d9cdb;--wr-color:#7b68ee;--te-color:#ff6b35;
--tier-s-plus:#f0c040;--tier-s:#ff6b35;--tier-a-plus:#e63946;--tier-a:#d62246;
--tier-b-plus:#7b68ee;--tier-b:#4a6fa5;--tier-c-plus:#2d9cdb;--tier-c:#27ae60;
--tier-d:#6b7280;--tier-f:#4b5563;
}
body{font-family:'Outfit',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg-secondary);}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted);}
.mono{font-family:'JetBrains Mono',monospace;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.fade-in{animation:fadeIn .3s ease both;}
.app-container{max-width:1440px;margin:0 auto;padding:0 16px;}
.header{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,var(--bg-primary) 0%,var(--bg-primary) 85%,transparent 100%);padding:12px 0 20px;backdrop-filter:blur(12px);}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.logo{display:flex;align-items:baseline;gap:8px;}
.logo h1{font-size:22px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--accent-gold),var(--accent-orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo .league-tag{font-size:11px;color:var(--text-muted);font-weight:400;letter-spacing:0.5px;}
.nav-tabs{display:flex;gap:4px;background:var(--bg-secondary);border-radius:8px;padding:3px;border:1px solid var(--border);}
.nav-tab{padding:7px 16px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;color:var(--text-secondary);border:none;background:none;}
.nav-tab:hover{color:var(--text-primary);background:var(--bg-hover);}
.nav-tab.active{background:var(--bg-tertiary);color:var(--accent-gold);box-shadow:0 1px 3px rgba(0,0,0,.3);}
.controls-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.search-box{flex:1;min-width:200px;max-width:360px;position:relative;}
.search-box input{width:100%;padding:8px 12px 8px 34px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:13px;font-family:'Outfit',sans-serif;outline:none;transition:border-color .2s;}
.search-box input:focus{border-color:var(--accent-gold);}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);}
.pos-filters{display:flex;gap:3px;background:var(--bg-secondary);border-radius:8px;padding:3px;border:1px solid var(--border);}
.pos-btn{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;border:none;background:none;color:var(--text-secondary);}
.pos-btn:hover{color:var(--text-primary);}
.pos-btn.active{color:#fff;}
.pos-btn.active[data-pos="ALL"]{background:var(--text-muted);}
.pos-btn.active[data-pos="QB"]{background:var(--qb-color);}
.pos-btn.active[data-pos="RB"]{background:var(--rb-color);}
.pos-btn.active[data-pos="WR"]{background:var(--wr-color);}
.pos-btn.active[data-pos="TE"]{background:var(--te-color);}
.pos-btn.active[data-pos="PICK"]{background:var(--accent-gold);}
.sort-select{padding:7px 10px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:12px;font-family:'Outfit',sans-serif;cursor:pointer;outline:none;}
.player-count{font-size:12px;color:var(--text-muted);margin-left:auto;}
.table-container{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--bg-secondary);}
.table-header{display:grid;grid-template-columns:36px 2fr .5fr .7fr .5fr .6fr .5fr .5fr .5fr .5fr .4fr;padding:8px 12px;background:var(--bg-tertiary);border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;align-items:center;}
.table-row,.player-row{display:grid;grid-template-columns:36px 2fr .5fr .7fr .5fr .6fr .5fr .5fr .5fr .5fr .4fr;padding:10px 12px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:background .15s;font-size:13px;}
.table-row:hover,.player-row:hover{background:var(--bg-hover);}
.table-row:last-child{border-bottom:none;}
.rank-num{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:12px;color:var(--text-muted);}
.player-info{display:flex;align-items:center;gap:8px;min-width:0;}
.player-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.player-meta{font-size:11px;color:var(--text-muted);}
.pos-badge{display:inline-flex;align-items:center;justify-content:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;color:#fff;}
.pos-badge.QB{background:var(--qb-color);}
.pos-badge.RB{background:var(--rb-color);}
.pos-badge.WR{background:var(--wr-color);}
.pos-badge.TE{background:var(--te-color);}
.value-cell{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;}
.tier-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.3px;}
.ppg-cell{font-family:'JetBrains Mono',monospace;font-size:13px;}
.years-cell{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-secondary);}
.trend-up{color:var(--accent-green);}
.trend-down{color:var(--accent-red);}
.trend-flat{color:var(--text-muted);}
.risk-low{color:var(--accent-green);}
.risk-med{color:var(--accent-gold);}
.risk-high{color:var(--accent-red);}
.add-trade-btn{padding:3px 6px;border-radius:4px;font-size:10px;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text-muted);transition:all .15s;}
.add-trade-btn:hover{border-color:var(--accent-gold);color:var(--accent-gold);}
.player-detail{background:var(--bg-card);border-bottom:1px solid var(--border);padding:16px;animation:fadeIn .25s ease;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.detail-section{background:var(--bg-tertiary);border-radius:8px;padding:12px;border:1px solid var(--border);}
.detail-section h4{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:8px;}
.breakdown-bar{height:8px;border-radius:4px;background:var(--bg-primary);overflow:hidden;display:flex;margin-bottom:4px;}
.breakdown-bar div{height:100%;transition:width .3s;}
.proj-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px;border-bottom:1px solid var(--border);}
.proj-row:last-child{border:none;}
.history-row{display:flex;gap:12px;align-items:center;}
.history-bar{flex:1;height:18px;border-radius:3px;position:relative;overflow:hidden;}
.history-bar-fill{height:100%;border-radius:3px;transition:width .4s;}
.history-label{font-size:11px;color:var(--text-secondary);width:32px;}
.history-value{font-size:11px;font-family:'JetBrains Mono',monospace;width:40px;text-align:right;}
.trade-calc{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;padding:16px 0;}
.trade-side{background:var(--bg-secondary);border:1px solid var(--border);border-radius:10px;padding:16px;}
.trade-side h3{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.trade-search{width:100%;padding:8px 12px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:13px;font-family:'Outfit',sans-serif;outline:none;margin-bottom:8px;}
.trade-search:focus{border-color:var(--accent-gold);}
.trade-results{max-height:160px;overflow-y:auto;margin-bottom:8px;}
.trade-result-item{padding:6px 8px;cursor:pointer;font-size:12px;border-radius:4px;display:flex;justify-content:space-between;align-items:center;}
.trade-result-item:hover{background:var(--bg-hover);}
.trade-player-chip{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:6px;margin-bottom:4px;font-size:13px;animation:fadeIn .2s ease;}
.trade-player-chip .remove{cursor:pointer;color:var(--text-muted);font-size:16px;line-height:1;}
.trade-player-chip .remove:hover{color:var(--accent-red);}
.trade-total{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.trade-total-value{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;}
.trade-middle{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px 0;}
.trade-diff{text-align:center;}
.trade-diff-value{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:800;}
.fairness-meter{width:160px;height:8px;background:var(--bg-tertiary);border-radius:4px;overflow:hidden;position:relative;}
.fairness-fill{height:100%;border-radius:4px;transition:all .3s;}
.trade-context{font-size:11px;color:var(--text-secondary);text-align:center;max-width:140px;line-height:1.4;}
.clear-btn{padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text-secondary);transition:all .15s;margin-top:8px;}
.clear-btn:hover{border-color:var(--accent-red);color:var(--accent-red);}
.copy-btn{padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--accent-gold);background:none;color:var(--accent-gold);transition:all .15s;margin-top:4px;}
.copy-btn:hover{background:var(--accent-gold);color:var(--bg-primary);}
.league-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;padding:16px 0;}
.league-team-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:10px;padding:14px;transition:border-color .2s;}
.league-team-card:hover{border-color:var(--border-light);}
.league-team-card h3{font-size:14px;font-weight:700;margin-bottom:8px;}
.league-team-card .team-value{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;margin-bottom:8px;}
.pos-breakdown{display:flex;gap:6px;margin-bottom:6px;}
.pos-break-item{flex:1;text-align:center;padding:4px;background:var(--bg-tertiary);border-radius:4px;font-size:10px;}
.pos-break-item .pos-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;}
.league-loading{text-align:center;padding:40px;color:var(--text-muted);}
.scarcity-section{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 0;}
.scarcity-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.scarcity-card h4{font-size:12px;color:var(--text-muted);margin-bottom:6px;}
.scarcity-ratio{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;margin-bottom:4px;}
.scarcity-bar{height:6px;background:var(--bg-tertiary);border-radius:3px;overflow:hidden;margin-top:6px;}
.scarcity-fill{height:100%;border-radius:3px;}
@media(max-width:900px){
.table-header,.table-row,.player-row{grid-template-columns:32px 1.8fr .5fr .7fr .5fr .6fr .5fr;}
.table-header>:nth-child(n+8),.table-row>:nth-child(n+8),.player-row>:nth-child(n+8){display:none;}
.detail-grid{grid-template-columns:1fr;}
.trade-calc{grid-template-columns:1fr;gap:12px;}
.trade-middle{flex-direction:row;padding:12px 0;}
.scarcity-section{grid-template-columns:1fr 1fr;}
}
@media(max-width:600px){
.table-header,.table-row,.player-row{grid-template-columns:28px 1.5fr .5fr .6fr .5fr;}
.table-header>:nth-child(n+6),.table-row>:nth-child(n+6),.player-row>:nth-child(n+6){display:none;}
.header-top{flex-direction:column;align-items:flex-start;}
.controls-row{flex-direction:column;align-items:stretch;}
.search-box{max-width:100%;}
}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
.empty-state h3{font-size:18px;margin-bottom:8px;color:var(--text-secondary);}
</style>

};
function getPosMean(pos,age){
  var curve=POS_AGE_MEAN[pos];
  if(!curve)return 8;
  if(curve[age])return curve[age];
  // Find nearest age
  var ages=Object.keys(curve).map(Number).sort(function(a,b){return a-b;});
  if(age<=ages[0])return curve[ages[0]];
  if(age>=ages[ages.length-1])return curve[ages[ages.length-1]];
  // Interpolate
  for(var i=0;i<ages.length-1;i++){
    if(age>=ages[i]&&age<=ages[i+1]){
      var frac=(age-ages[i])/(ages[i+1]-ages[i]);
      return curve[ages[i]]*(1-frac)+curve[ages[i+1]]*frac;

var ELITE_PAR_THRESH={QB:4.4,RB:8.3,WR:5.5,TE:3.6};

function calcWeightedPPG(p){
const seasons=[];
if(p.ppg25&&p.gp25>=4)seasons.push({ppg:p.ppg25,weight:0.50,yr:2025,gp:p.gp25});
if(p.ppg24&&p.gp24>=4)seasons.push({ppg:p.ppg24,weight:0.30,yr:2024,gp:p.gp24||14});
if(p.ppg23&&p.gp23>=4)seasons.push({ppg:p.ppg23,weight:0.20,yr:2023,gp:p.gp23||14});
seasons.sort((a,b)=>b.yr-a.yr);

// Look up 2026 projection
const proj=PROJ_2026[p.name];
const projPPG=proj?proj.ppg:0;
const nHist=seasons.length;
const posMean=getPosMean(p.pos, p.age||25);

// CASE 1: Has projection + has history → blend with data-driven optimal weights
if(projPPG>0 && nHist>0){
  // PHASE DETECTION on historical data
  let phase='stable';
  if(nHist>=2){
    const diffs=[];
    for(let i=0;i<nHist-1;i++){diffs.push(seasons[i].ppg-seasons[i+1].ppg);}
    const avgDiff=diffs.reduce((s,d)=>s+d,0)/diffs.length;
    if(avgDiff>PHASE_ASC_THRESH)phase='ascending';
    else if(avgDiff<PHASE_DEC_THRESH)phase='declining';
  }

  // Historical weighted PPG with phase-adjusted recency
  const recentW=PHASE_WEIGHTS[phase]||0.61;
  let histPPG;
  if(nHist===1){histPPG=seasons[0].ppg;}
  else if(nHist===2){histPPG=seasons[0].ppg*recentW+seasons[1].ppg*(1-recentW);}
  else{
    const rem=1-recentW;
    histPPG=seasons[0].ppg*recentW+seasons[1].ppg*rem*0.6+seasons[2].ppg*rem*0.4;
  }

  // DATA-DRIVEN blend weights by number of historical seasons
  // (optimized from 1,928 test cases, RMSE=2.99 vs 3.14 historical-only)
  let pw,hw,mw;
  if(nHist===1){pw=0.75;hw=0.10;mw=0.15;}
  else if(nHist===2){pw=0.50;hw=0.30;mw=0.20;}
  else if(nHist===3){pw=0.50;hw=0.35;mw=0.15;}
  else if(nHist===4){pw=0.55;hw=0.25;mw=0.20;}
  else{pw=0.45;hw=0.30;mw=0.25;}

  return pw*projPPG + hw*histPPG + mw*posMean;
}

// CASE 2: Has projection but NO history (rookies in projection set)
if(projPPG>0 && nHist===0){
  return 0.75*projPPG + 0.25*posMean;
}

// CASE 3: No projection → fall back to historical-only with regression
if(nHist===0)return 0;

// Phase detection
let phase='stable';
if(nHist>=2){
  const diffs=[];
  for(let i=0;i<nHist-1;i++){diffs.push(seasons[i].ppg-seasons[i+1].ppg);}
  const avgDiff=diffs.reduce((s,d)=>s+d,0)/diffs.length;
  if(avgDiff>PHASE_ASC_THRESH)phase='ascending';
  else if(avgDiff<PHASE_DEC_THRESH)phase='declining';
}

const recentW=PHASE_WEIGHTS[phase]||0.61;
let wppg;
if(nHist===1){wppg=seasons[0].ppg;}
else if(nHist===2){wppg=seasons[0].ppg*recentW+seasons[1].ppg*(1-recentW);}
else{
  const rem=1-recentW;
  wppg=seasons[0].ppg*recentW+seasons[1].ppg*rem*0.6+seasons[2].ppg*rem*0.4;
}

// Sample size regression toward age-specific positional mean
const rw=REGRESS_WEIGHTS[nHist]||REGRESS_WEIGHTS[8]||0.64;
wppg=rw*wppg+(1-rw)*posMean;

return wppg;
}

function calcInjuryRisk(p){
const gamesPlayed=[];
if(p.gp25!==undefined&&p.gp25!==null)gamesPlayed.push(p.gp25);
if(p.gp24!==undefined&&p.gp24!==null)gamesPlayed.push(p.gp24||14);
if(p.gp23!==undefined&&p.gp23!==null)gamesPlayed.push(p.gp23||14);
if(gamesPlayed.length===0)return 1.0;
let avgGP;
if(gamesPlayed.length===1)avgGP=gamesPlayed[0];
else if(gamesPlayed.length===2)avgGP=gamesPlayed[0]*0.65+gamesPlayed[1]*0.35;
else avgGP=gamesPlayed[0]*0.50+gamesPlayed[1]*0.30+gamesPlayed[2]*0.20;
// DATA-DRIVEN non-linear durability: base=0.30 + 0.55*sqrt(avgGP/17)
// RMSE improved 15% vs linear (0.1883 vs 0.2217)
const risk=0.30+0.55*Math.sqrt(avgGP/17);
return Math.min(1.0,Math.max(0.30,risk));
}

// CHANGE #5: Player-specific peak adjustment
// Calculate implied peak from each season, use trajectory to determine actual peak
function calcPlayerPeak(p){
const curve=AGING[p.pos]||AGING.WR;
const ceiling={QB:28.1,RB:25.8,WR:21.6,TE:17.4}[p.pos]||22; // max observed PPG (10+ GP, 2016-2024)
const impliedPeaks=[];

// Calculate implied peak from each available season
if(p.ppg25&&p.gp25>=4){
const cv=curve[p.age]||0.5; // age in 2025 = p.age - 1 (p.age is entering 2026)
const ageIn2025=p.age-1;
const cv25=curve[ageIn2025]||curve[p.age]||0.5;
if(cv25>0)impliedPeaks.push({yr:2025,implied:Math.min(p.ppg25/cv25,ceiling)});
}
if(p.ppg24&&p.gp24>=4){
const ageIn2024=p.age-2;
const cv24=curve[ageIn2024]||0.5;
if(cv24>0)impliedPeaks.push({yr:2024,implied:Math.min(p.ppg24/cv24,ceiling)});
}
if(p.ppg23&&p.gp23>=4){
const ageIn2023=p.age-3;
const cv23=curve[ageIn2023]||0.5;
if(cv23>0)impliedPeaks.push({yr:2023,implied:Math.min(p.ppg23/cv23,ceiling)});
}

if(impliedPeaks.length===0)return ceiling*0.5;

// Weight recent implied peaks more heavily
impliedPeaks.sort((a,b)=>b.yr-a.yr);
let peakEstimate;
if(impliedPeaks.length===1)peakEstimate=impliedPeaks[0].implied;
else if(impliedPeaks.length===2)peakEstimate=impliedPeaks[0].implied*0.65+impliedPeaks[1].implied*0.35;
else peakEstimate=impliedPeaks[0].implied*0.50+impliedPeaks[1].implied*0.30+impliedPeaks[2].implied*0.20;

// Cap at position ceiling
return Math.min(peakEstimate,ceiling);
}

// Calculate top-10 and top-20 thresholds from 2025 data (top-5 and top-10 for TE)
function calcEliteThresholds(players){
const byPos={QB:[],RB:[],WR:[],TE:[]};
players.forEach(p=>{if(byPos[p.pos]&&p.ppg25)byPos[p.pos].push(p.ppg25);});
Object.keys(byPos).forEach(pos=>byPos[pos].sort((a,b)=>b-a));
return{
t10:{QB:byPos.QB[9]||15,RB:byPos.RB[9]||11,WR:byPos.WR[9]||11,TE:byPos.TE[4]||10},
t20:{QB:byPos.QB[19]||12,RB:byPos.RB[19]||8,WR:byPos.WR[19]||8,TE:byPos.TE[9]||7}
};
}

function calcValue(p,thresholds){
const weightedPPG=calcWeightedPPG(p);
if(weightedPPG<=0)return{val:0,projs:[],risk:0.5,eliteYrs:0,starterYrs:0,weightedPPG:0,peakPPG:0,proj2026:(PROJ_2026[p.name]?PROJ_2026[p.name].ppg:0)};

const risk=calcInjuryRisk(p);
const curve=AGING[p.pos]||AGING.WR;
const dr=DISC_RATE[p.pos]||0.15;
const repl=REPL_LEVEL[p.pos]||8;
const maxAge=Math.max(...Object.keys(curve).map(Number));

const playerPeak=calcPlayerPeak(p);

// CONFIDENCE DISCOUNT: fewer career games = less certainty
const totalGP=(p.gp25||0)+(p.gp24||0)+(p.gp23||0);
const confidence=Math.min(1.0,0.50+0.50*(totalGP/34));

// PROJECTED GAMES PER SEASON: weighted average of recent GP
// Captures durability — fragile players get fewer games of PAR credit
const gpSeasons=[];
if(p.gp25)gpSeasons.push(p.gp25);
if(p.gp24)gpSeasons.push(p.gp24);
if(p.gp23)gpSeasons.push(p.gp23);
let projGP=17;
if(gpSeasons.length===1)projGP=gpSeasons[0];
else if(gpSeasons.length===2)projGP=gpSeasons[0]*0.65+gpSeasons[1]*0.35;
else if(gpSeasons.length>=3)projGP=gpSeasons[0]*0.50+gpSeasons[1]*0.30+gpSeasons[2]*0.20;
projGP=Math.min(17,Math.max(6,projGP));

let npv=0;
const projs=[];

for(let yr=0;yr<=maxAge-p.age;yr++){
const fa=p.age+yr;
const cv=curve[fa]||0;
if(cv===0)break;

// Project PPG for this season
const genericProj=playerPeak*cv;
const currentPPG=weightedPPG;
let pppg;
if(cv>=curve[p.age]){
pppg=Math.max(genericProj,currentPPG);
}else{
pppg=playerPeak*cv;
}

// Apply no situation adjustment — pure data-driven projection
const adjPPG=pppg;

// CHAMPIONSHIP EQUITY: Points Above Replacement, raised to power k
// Apply DATA-DRIVEN scarcity multiplier: QB/RB/TE elite worth more than raw PAR suggests
const par=Math.max(0,adjPPG-repl);
const scarcity=SCARCITY_MULT[p.pos]||1.0;
const seasonEquity=Math.pow(par,K_EXPONENT)*projGP*scarcity;

// Discount by year and confidence; apply injury risk via GP already
const disc=seasonEquity*confidence*risk/Math.pow(1+dr,yr);
npv+=disc;
projs.push({yr:2026+yr,age:fa,ppg:+pppg.toFixed(1),adjPPG:+adjPPG.toFixed(1),par:+par.toFixed(1),gp:Math.round(projGP),disc:Math.round(disc)});
}

// ELITE & STARTER YEARS REMAINING
// Elite threshold: mean PAR + 1 SD at position (computed from 2025 starters)
// Starter threshold: PAR > 0 (above replacement)
// These use raw projected PAR (before GP weighting) since we're asking about production level
const eliteYrs=projs.filter(pr=>pr.par>0).length>0?projs.filter(pr=>{
const posElite=ELITE_PAR_THRESH[p.pos]||6;
return pr.par>=posElite;
}).length:0;
const starterYrs=projs.filter(pr=>pr.par>0).length;

const rawVal=Math.round(npv);
return{val:rawVal,projs,risk,eliteYrs,starterYrs,weightedPPG,peakPPG:playerPeak,confidence,projGP:Math.round(projGP),proj2026:(PROJ_2026[p.name]?PROJ_2026[p.name].ppg:0)};
}

function getTier(v){
if(v>=800)return{t:'S+',c:'var(--tier-s-plus)',l:'Untouchable'};
if(v>=650)return{t:'S',c:'var(--tier-s)',l:'Elite Asset'};
if(v>=500)return{t:'A+',c:'var(--tier-a-plus)',l:'Premium'};
if(v>=380)return{t:'A',c:'var(--tier-a)',l:'Cornerstone'};
if(v>=280)return{t:'B+',c:'var(--tier-b-plus)',l:'Strong Starter'};
if(v>=200)return{t:'B',c:'var(--tier-b)',l:'Starter'};
if(v>=130)return{t:'C+',c:'var(--tier-c-plus)',l:'Flex/Depth'};
if(v>=70)return{t:'C',c:'var(--tier-c)',l:'Bench'};
if(v>=30)return{t:'D',c:'var(--tier-d)',l:'Stash'};
return{t:'F',c:'var(--tier-f)',l:'Waiver'};
}

// Shared helper: build optimal lineup from a roster
function buildOptimalLineup(rosterPlayers){
  var byPos = {QB:[],RB:[],WR:[],TE:[]};
  rosterPlayers.forEach(function(p){if(byPos[p.pos])byPos[p.pos].push(p);});
  // Sort by PAR using livePPG (raw 2026 projection) for lineup decisions
  function getLivePAR(p){return Math.max(0,(p.livePPG||p.ppg||0)-(REPL_LEVEL[p.pos]||8));}
  Object.keys(byPos).forEach(function(k){byPos[k].sort(function(a,b){return getLivePAR(b)-getLivePAR(a);});});
  var starters = []; var used = {};
  [{pos:'QB',n:2},{pos:'RB',n:3},{pos:'WR',n:4},{pos:'TE',n:1}].forEach(function(s){
    byPos[s.pos].slice(0,s.n).forEach(function(p){starters.push({name:p.name,pos:p.pos,team:p.team||'',val:p.val||0,ppg:p.livePPG||p.ppg||0,livePPG:p.livePPG||p.ppg||0,age:p.age||0,matched:p.matched!==false,slot:s.pos});used[p.name]=true;});
  });
  var flexPool = [].concat(byPos.RB,byPos.WR,byPos.TE).filter(function(p){return !used[p.name];}).sort(function(a,b){return getLivePAR(b)-getLivePAR(a);});
  flexPool.slice(0,2).forEach(function(p){starters.push({name:p.name,pos:p.pos,team:p.team||'',val:p.val||0,ppg:p.livePPG||p.ppg||0,livePPG:p.livePPG||p.ppg||0,age:p.age||0,matched:p.matched!==false,slot:'FLEX'});used[p.name]=true;});
  var bench = rosterPlayers.filter(function(p){return !used[p.name];}).sort(function(a,b){return (b.val||0)-(a.val||0);});
  // starterPPG now uses livePPG (raw 2026 projections)
  var starterPPG = starters.reduce(function(s,p){return s+(p.livePPG||p.ppg||0);},0);
  var starterVal = starters.reduce(function(s,p){return s+(p.val||0);},0);
  var benchSorted = bench.slice().sort(function(a,b){return (b.val||0)-(a.val||0);});
  var benchVal = 0;
  benchSorted.forEach(function(p,i){
    var discount = i===0?0.60:i===1?0.30:0.15;
    benchVal += (p.val||0)*discount;
  });
  return {starters:starters,bench:bench,starterPPG:starterPPG,starterVal:starterVal,benchVal:benchVal};
}

// Shared helper: compute PAR for a player
// Uses livePPG (raw 2026 projection) when available for lineup accuracy
function getPlayerPAR(p){
  var r = REPL_LEVEL[p.pos] || 8;
  var ppg = p.livePPG || p.ppg || 0;
  return Math.max(0, ppg - r);
}

// Shared helper: get slot rank in league
function getSlotRanks(teamData){
  if(!teamData||!teamData.length) return {};
  var slotPlayers = {};
  teamData.forEach(function(t){
    t.starters.forEach(function(s){
      var key = s.slot;
      if(!slotPlayers[key]) slotPlayers[key] = [];
      slotPlayers[key].push({teamName:t.teamName,name:s.name,ppg:s.ppg||0,val:s.val||0});
    });
  });
  // For multi-slot positions, number them
  var ranked = {};
  teamData.forEach(function(t){
    var posCounts = {};
    t.starters.forEach(function(s){
      var base = s.slot;
      if(!posCounts[base]) posCounts[base] = 0;
      posCounts[base]++;
      var slotLabel = base + posCounts[base];
      var pool = [];
      teamData.forEach(function(ot){
        var otCount = 0;
        ot.starters.filter(function(os){return os.slot===base;}).sort(function(a,b){return (b.ppg||0)-(a.ppg||0);}).forEach(function(os){
          otCount++;
          if(otCount===posCounts[base]) pool.push({teamName:ot.teamName,ppg:os.ppg||0});
        });
      });
      pool.sort(function(a,b){return b.ppg-a.ppg;});
      var rank = pool.findIndex(function(x){return x.teamName===t.teamName;})+1;
      if(!ranked[t.teamName]) ranked[t.teamName] = {};
      ranked[t.teamName][slotLabel] = {rank:rank,of:pool.length};
    });
  });
  return ranked;
}

// Roster efficiency: categorize bench as insurance vs surplus
function classifyBench(team){
  var slotCounts = {QB:2,RB:3,WR:4,TE:1};
  var flexSlots = 2;
  var result = [];
  var byPos = {QB:[],RB:[],WR:[],TE:[]};
  team.bench.forEach(function(p){if(byPos[p.pos])byPos[p.pos].push(p);});
  
  // Insurance = 1 backup per starter slot
  var insuranceSlots = {QB:1,RB:2,WR:2,TE:1}; // reasonable injury insurance
  ['QB','RB','WR','TE'].forEach(function(pos){
    var benchPos = byPos[pos].sort(function(a,b){return (b.val||0)-(a.val||0);});
    var ins = insuranceSlots[pos]||1;
    benchPos.forEach(function(p,i){
      result.push({name:p.name,pos:p.pos,val:p.val||0,ppg:p.ppg||0,age:p.age||0,
        classification: i < ins ? 'insurance' : 'surplus'});
    });
  });
  return result;
}

        h('div',{className:'comp-row'},h('span',null,'Elite Yrs'),h('span',{className:'mono',style:{color:p.eliteYrs>=3?'var(--accent-green)':p.eliteYrs>=1?'var(--accent-gold)':'var(--text-muted)'}},p.eliteYrs)),

  // Compute KTC edge for this player

// TRADE CALCULATOR (with evaluate, multiple picks)
// ============================================================
function TradeCalculator(props){
  var teamData = props.teamData;
  var sA = useState([]); var sideA = sA[0]; var setSideA = sA[1];
  var sB = useState([]); var sideB = sB[0]; var setSideB = sB[1];
  var sSearchA = useState(''); var searchA = sSearchA[0]; var setSearchA = sSearchA[1];
  var sSearchB = useState(''); var searchB = sSearchB[0]; var setSearchB = sSearchB[1];
  var sTeamA = useState(''); var teamA = sTeamA[0]; var setTeamA = sTeamA[1];
  var sTeamB = useState(''); var teamB = sTeamB[0]; var setTeamB = sTeamB[1];
  var evalState = useState(null); var evalResult = evalState[0]; var setEvalResult = evalState[1];
  var excludeState = useState({}); var excludes = excludeState[0]; var setExcludes = excludeState[1];
  var includeState = useState({}); var includes = includeState[0]; var setIncludes = includeState[1];

  function toggleExclude(name){
    setExcludes(function(prev){var n=Object.assign({},prev);if(n[name])delete n[name];else{n[name]=true;}return n;});
    setIncludes(function(prev){var n=Object.assign({},prev);delete n[name];return n;});
  }
  function toggleInclude(name){
    setIncludes(function(prev){var n=Object.assign({},prev);if(n[name])delete n[name];else{n[name]=true;}return n;});
    setExcludes(function(prev){var n=Object.assign({},prev);delete n[name];return n;});
  }

  var teamAData = teamData ? teamData.find(function(t){return t.teamName===teamA;}) : null;
  var teamBData = teamData ? teamData.find(function(t){return t.teamName===teamB;}) : null;

  var totalA = sideA.reduce(function(s,p){return s+p.val;},0);
  var totalB = sideB.reduce(function(s,p){return s+p.val;},0);
  var diff = totalA - totalB;
  var absDiff = Math.abs(diff);
  var maxVal = Math.max(totalA,totalB,1);
  var fairPct = maxVal>0?Math.min(100,absDiff/maxVal*100):0;
  var fairColor = fairPct<5?'var(--accent-green)':fairPct<15?'var(--accent-gold)':'var(--accent-red)';
  var fairLabel = fairPct<5?'Fair Trade':fairPct<15?'Slight Edge':'Lopsided';

  // KTC, PPG, PAR totals
  function getKtcVal(p){var k=KTC_DATA[p.name];return k?k.v:0;}
  function getPPG(p){return p.ppg||0;}
  function getPAR(p){return p.isPick?0:Math.max(0,(p.ppg||0)-(REPL_LEVEL[p.pos]||8));}

  // KTC Raw Adjustment formula (replicates KTC trade calculator)
  var KTC_MAX_V = 9999; // max player value in KTC
  function ktcRawAdj(pVal, tVal, vVal){
    if(pVal<=0) return 0;
    var v = vVal || KTC_MAX_V;
    var t = Math.max(tVal, pVal);
    return pVal * (0.1 + 0.088*Math.pow(pVal/v, 8) + 0.156*Math.pow(pVal/t, 1.3) + 0.08*Math.pow(pVal/(v+2000), 1.28));
  }

  // Compute KTC-adjusted trade fairness for a set of players on each side
  function ktcTradeFairness(sA, sB){
    var allPlayers = sA.concat(sB);
    var tVal = 0; // most valuable player in the trade
    allPlayers.forEach(function(p){var kv=getKtcVal(p);if(kv>tVal)tVal=kv;});
    if(tVal===0) return {adjA:0,adjB:0,diff:0,evenPlayerVal:0};
    var adjA = sA.reduce(function(s,p){return s+ktcRawAdj(getKtcVal(p),tVal,KTC_MAX_V);},0);
    var adjB = sB.reduce(function(s,p){return s+ktcRawAdj(getKtcVal(p),tVal,KTC_MAX_V);},0);
    var rawDiff = adjA - adjB;
    // Find what KTC value player would even the trade (for the losing side)
    var evenPlayerVal = 0;
    if(Math.abs(rawDiff)>1){
      var target = Math.abs(rawDiff);
      var lo=0;var hi=KTC_MAX_V;
      for(var iter=0;iter<50;iter++){
        var mid=(lo+hi)/2;
        var midAdj=ktcRawAdj(mid,tVal,KTC_MAX_V);
        if(midAdj<target)lo=mid;else hi=mid;
      }
      evenPlayerVal=Math.round((lo+hi)/2);
    }
    return {adjA:adjA,adjB:adjB,diff:rawDiff,evenPlayerVal:evenPlayerVal};
  }

  var ktcA = sideA.reduce(function(s,p){return s+getKtcVal(p);},0);
  var ktcB = sideB.reduce(function(s,p){return s+getKtcVal(p);},0);
  var ktcFairness = ktcTradeFairness(sideA, sideB);
  var ppgA = sideA.reduce(function(s,p){return s+getPPG(p);},0);
  var ppgB = sideB.reduce(function(s,p){return s+getPPG(p);},0);
  var parA = sideA.reduce(function(s,p){return s+getPAR(p);},0);
  var parB = sideB.reduce(function(s,p){return s+getPAR(p);},0);

  // Suggest trades state
  var sugState = useState(null); var suggestions = sugState[0]; var setSuggestions = sugState[1];
  var sugLoading = useState(false); var isSugLoading = sugLoading[0]; var setSugLoading = sugLoading[1];
  var sugTabState = useState('byVal'); var sugTab = sugTabState[0]; var setSugTab = sugTabState[1];

  function suggestTrades(){
    if(!teamAData||!teamBData) return;
    setSugLoading(true);
    setTimeout(function(){
      var poolA = teamAData.rosterPlayers.filter(function(p){return p.val>30 && p.pos && !excludes[p.name];});
      var poolB = teamBData.rosterPlayers.filter(function(p){return p.val>30 && p.pos && !excludes[p.name];});
      var mustInclude = Object.keys(includes).filter(function(n){return includes[n];});
      var beforeA = buildOptimalLineup(teamAData.rosterPlayers);
      var beforeAPPG = beforeA.starterPPG;
      var beforeAPAR = beforeA.starters.reduce(function(s,p){return s+getPlayerPAR(p);},0);
      var results = [];

      function tryTrade(give,get){
        var giveNames = give.map(function(p){return p.name;});
        // Must include all forced players
        for(var mi=0;mi<mustInclude.length;mi++){
          if(giveNames.indexOf(mustInclude[mi])<0) return;
        }
        var giveVal = give.reduce(function(s,p){return s+p.val;},0);
        var getVal = get.reduce(function(s,p){return s+p.val;},0);
        var modelEdge = getVal - giveVal;
        if(modelEdge <= 0) return;
        var giveKtc = give.reduce(function(s,p){return s+getKtcVal(p);},0);
        var getKtc = get.reduce(function(s,p){return s+getKtcVal(p);},0);
        // Use KTC raw adjustment to check fairness (opponent's perspective)
        // Opponent gives 'get' players, receives 'give' players
        var ktcFair = ktcTradeFairness(give, get);
        // ktcFair.diff > 0 means Team A (give side) has more raw adj = opponent wins on KTC
        // ktcFair.diff < 0 means opponent loses on KTC
        // We want opponent to win or break even: ktcFair.diff >= 0 OR evenPlayerVal small
        var ktcEdge = ktcFair.diff; // positive = opponent wins on KTC adjusted
        if(ktcEdge < 0 && ktcFair.evenPlayerVal > 500) return; // opponent loses too much on KTC adjusted
        var newRosterA = teamAData.rosterPlayers.filter(function(p){return giveNames.indexOf(p.name)<0;});
        get.forEach(function(p){
          var existing = teamBData.rosterPlayers.find(function(rp){return rp.name===p.name;});
          if(existing) newRosterA.push(existing);
        });
        var afterA = buildOptimalLineup(newRosterA);
        var afterAPPG = afterA.starterPPG;
        var afterAPAR = afterA.starters.reduce(function(s,p){return s+getPlayerPAR(p);},0);
        if(afterAPPG < beforeAPPG - 0.05) return;
        if(afterAPAR < beforeAPAR - 0.05) return;
        results.push({
          give:give,get:get,modelEdge:modelEdge,ktcEdge:ktcEdge,ktcEvenVal:ktcFair.evenPlayerVal,
          ktcRawA:giveKtc,ktcRawB:getKtc,
          ppgDelta:afterAPPG-beforeAPPG,parDelta:afterAPAR-beforeAPAR,
          valDelta:modelEdge,
          afterStarters:afterA.starters,beforeStarters:beforeA.starters
        });
      }

      var hasInc = mustInclude.length > 0;
      for(var i=0;i<poolA.length;i++){
        if(hasInc && mustInclude.length===1 && poolA[i].name!==mustInclude[0]) continue;
        if(hasInc && mustInclude.length>1) continue;
        for(var j=0;j<poolB.length;j++){ tryTrade([poolA[i]],[poolB[j]]); }
      }
      for(var i=0;i<Math.min(poolA.length,20);i++){
        for(var i2=i+1;i2<Math.min(poolA.length,20);i2++){
          if(hasInc){var nn=[poolA[i].name,poolA[i2].name];if(!mustInclude.every(function(n){return nn.indexOf(n)>=0;}))continue;}
          for(var j=0;j<poolB.length;j++){ tryTrade([poolA[i],poolA[i2]],[poolB[j]]); }
        }
      }
      for(var i=0;i<poolA.length;i++){
        if(hasInc && mustInclude.length===1 && poolA[i].name!==mustInclude[0]) continue;
        if(hasInc && mustInclude.length>1) continue;
        for(var j=0;j<Math.min(poolB.length,20);j++){
          for(var j2=j+1;j2<Math.min(poolB.length,20);j2++){ tryTrade([poolA[i]],[poolB[j],poolB[j2]]); }
        }
      }
      for(var i=0;i<Math.min(poolA.length,12);i++){
        for(var i2=i+1;i2<Math.min(poolA.length,12);i2++){
          if(hasInc){var nn2=[poolA[i].name,poolA[i2].name];if(!mustInclude.every(function(n){return nn2.indexOf(n)>=0;}))continue;}
          for(var j=0;j<Math.min(poolB.length,12);j++){
            for(var j2=j+1;j2<Math.min(poolB.length,12);j2++){ tryTrade([poolA[i],poolA[i2]],[poolB[j],poolB[j2]]); }
          }
        }
      }
      var seen={};var unique=[];
      results.forEach(function(r){var key=r.give.map(function(p){return p.name;}).sort().join('|')+'>>'+r.get.map(function(p){return p.name;}).sort().join('|');if(!seen[key]){seen[key]=true;unique.push(r);}});
      var byVal=unique.slice().sort(function(a,b){return b.valDelta-a.valDelta;}).slice(0,5);
      var byPPG=unique.slice().sort(function(a,b){return b.ppgDelta-a.ppgDelta;}).slice(0,5);
      var byPAR=unique.slice().sort(function(a,b){return b.parDelta-a.parDelta;}).slice(0,5);
      setSuggestions({byVal:byVal,byPPG:byPPG,byPAR:byPAR,beforeStarters:beforeA.starters});
      setSugLoading(false);
    },50);
  }

  // Evaluate trade: simulate post-trade rosters
  function evaluateTrade(){
    if(!teamAData||!teamBData||sideA.length===0||sideB.length===0){setEvalResult(null);return;}
    var namesA = sideA.filter(function(p){return !p.isPick;}).map(function(p){return p.name;});
    var namesB = sideB.filter(function(p){return !p.isPick;}).map(function(p){return p.name;});

    // Team A loses sideA players, gains sideB players (non-picks)
    var newRosterA = teamAData.rosterPlayers.filter(function(p){return namesA.indexOf(p.name)<0;});
    sideB.filter(function(p){return !p.isPick;}).forEach(function(p){
      var existing = teamBData.rosterPlayers.find(function(rp){return rp.name===p.name;});
      if(existing) newRosterA.push(existing);
    });

    var newRosterB = teamBData.rosterPlayers.filter(function(p){return namesB.indexOf(p.name)<0;});
    sideA.filter(function(p){return !p.isPick;}).forEach(function(p){
      var existing = teamAData.rosterPlayers.find(function(rp){return rp.name===p.name;});
      if(existing) newRosterB.push(existing);
    });

    var beforeA = buildOptimalLineup(teamAData.rosterPlayers);
    var afterA = buildOptimalLineup(newRosterA);
    var beforeB = buildOptimalLineup(teamBData.rosterPlayers);
    var afterB = buildOptimalLineup(newRosterB);

    // Calculate PAR for starters
    function calcTeamPAR(starters){
      return starters.reduce(function(s,p){return s+getPlayerPAR(p);},0);
    }

    setEvalResult({
      teamA:{name:teamA,before:beforeA,after:afterA,ppgDelta:afterA.starterPPG-beforeA.starterPPG,
        parBefore:calcTeamPAR(beforeA.starters),parAfter:calcTeamPAR(afterA.starters)},
      teamB:{name:teamB,before:beforeB,after:afterB,ppgDelta:afterB.starterPPG-beforeB.starterPPG,
        parBefore:calcTeamPAR(beforeB.starters),parAfter:calcTeamPAR(afterB.starters)}

  }

// TEAM COMPARISON TAB
// ============================================================
function TeamComparison(props){
  var teamData = props.teamData;
  var selA = useState(''); var teamA = selA[0]; var setTeamA = selA[1];
  var selB = useState(''); var teamB = selB[0]; var setTeamB = selB[1];

  if(!teamData||!teamData.length) return h('div',{style:{padding:40,textAlign:'center',color:'var(--text-muted)'}},'Load league data in the League tab first');

  var teamOptions = [h('option',{key:'_',value:''},'Select team...')].concat(teamData.map(function(t){return h('option',{key:t.teamName,value:t.teamName},t.teamName);}));

  // Build PAR-based lineups for ALL teams for ranking
  function buildPARLineup(rosterPlayers){
    var byPos = {QB:[],RB:[],WR:[],TE:[]};
    rosterPlayers.forEach(function(p){if(byPos[p.pos])byPos[p.pos].push(p);});
    // Sort each position by PAR descending (using livePPG for 2026 projections)
    Object.keys(byPos).forEach(function(k){byPos[k].sort(function(a,b){return getPlayerPAR(b)-getPlayerPAR(a);});});
    var starters = []; var used = {};
    [{pos:'QB',n:2},{pos:'RB',n:3},{pos:'WR',n:4},{pos:'TE',n:1}].forEach(function(s){
      byPos[s.pos].slice(0,s.n).forEach(function(p,i){
        var lppg = p.livePPG||p.ppg||0;
        starters.push({name:p.name,pos:p.pos,team:p.team||'',val:p.val||0,ppg:lppg,livePPG:lppg,age:p.age||0,par:getPlayerPAR(p),slot:s.pos,slotNum:i+1});
        used[p.name]=true;
      });
    });
    var flexPool = [].concat(byPos.RB,byPos.WR,byPos.TE).filter(function(p){return !used[p.name];}).sort(function(a,b){return getPlayerPAR(b)-getPlayerPAR(a);});
    flexPool.slice(0,2).forEach(function(p,i){
      var lppg = p.livePPG||p.ppg||0;
      starters.push({name:p.name,pos:p.pos,team:p.team||'',val:p.val||0,ppg:lppg,livePPG:lppg,age:p.age||0,par:getPlayerPAR(p),slot:'FLEX',slotNum:i+1});
      used[p.name]=true;
    });
    return starters;
  }

  // Build PAR lineups for all teams
  var allLineups = {};
  teamData.forEach(function(t){
    allLineups[t.teamName] = buildPARLineup(t.rosterPlayers);
  });

  // Build slot-specific PAR rankings across all teams
  // e.g. QB1 rank = compare each team's QB with slotNum=1 by PAR
  function getSlotPARRank(teamName,slot,slotNum){
    var allSlotPARs = [];
    teamData.forEach(function(t){
      var lu = allLineups[t.teamName];
      var match = lu.find(function(s){return s.slot===slot && s.slotNum===slotNum;});
      if(match) allSlotPARs.push({teamName:t.teamName,par:match.par});
    });
    allSlotPARs.sort(function(a,b){return b.par-a.par;});
    var rank = allSlotPARs.findIndex(function(x){return x.teamName===teamName;})+1;
    return rank||0;
  }

  var tA = teamData.find(function(t){return t.teamName===teamA;});
  var tB = teamData.find(function(t){return t.teamName===teamB;});

  function renderTeamColumn(team){
    if(!team) return h('div',{style:{flex:1,padding:20,textAlign:'center',color:'var(--text-muted)'}},'Select a team');
    var lineup = allLineups[team.teamName] || [];
    var totalPPG = lineup.reduce(function(s,p){return s+(p.ppg||0);},0);
    var totalPAR = lineup.reduce(function(s,p){return s+(p.par||0);},0);
    var totalVal = lineup.reduce(function(s,p){return s+(p.val||0);},0);

    var slotOrder = [['QB',1],['QB',2],['RB',1],['RB',2],['RB',3],['WR',1],['WR',2],['WR',3],['WR',4],['TE',1],['FLEX',1],['FLEX',2]];
    var rows = slotOrder.map(function(sl){
      var slot = sl[0]; var num = sl[1];
      var p = lineup.find(function(s){return s.slot===slot && s.slotNum===num;});
      var slotLabel = slot + num;
      if(!p) return h('div',{key:slotLabel,style:{display:'grid',gridTemplateColumns:'38px 1fr 36px 36px 36px',padding:'5px 0',fontSize:12,borderBottom:'1px solid var(--border)',alignItems:'center'}},
        h('span',{style:{color:'#555',fontSize:10,fontWeight:600}},slotLabel),h('span',{style:{color:'var(--text-muted)'}},'Empty'),h('span',null,''),h('span',null,''),h('span',null,''));
      var rank = getSlotPARRank(team.teamName,slot,num);
      var rankColor = rank<=3?'var(--accent-green)':rank<=6?'var(--accent-gold)':'var(--accent-red)';
      return h('div',{key:slotLabel,style:{display:'grid',gridTemplateColumns:'38px 1fr 36px 36px 36px',padding:'5px 0',fontSize:12,borderBottom:'1px solid var(--border)',alignItems:'center'}},
        h('span',{style:{color:PC[slot]||PC[p.pos]||'#888',fontSize:10,fontWeight:600}},slotLabel),
        h('span',{style:{fontWeight:500}},p.name),
        h('span',{className:'mono',style:{textAlign:'right',color:'var(--accent-cyan)',fontSize:11}},p.ppg>0?p.ppg.toFixed(1):'\u2014'),
        h('span',{className:'mono',style:{textAlign:'right',color:p.par>0?'var(--accent-green)':'var(--text-muted)',fontSize:11}},p.par.toFixed(1)),
        h('span',{className:'mono',style:{textAlign:'right',color:rankColor,fontSize:11,fontWeight:700}},'#'+rank)
      );
    });

    return h('div',{style:{flex:1,background:'var(--bg-secondary)',borderRadius:10,padding:16,border:'1px solid var(--border)'}},
      h('div',{style:{textAlign:'center',marginBottom:12}},
        h('div',{style:{fontSize:16,fontWeight:700}},team.teamName),
        h('div',{style:{display:'flex',justifyContent:'center',gap:16,marginTop:8}},
          h('div',{style:{textAlign:'center'}},
            h('div',{style:{fontSize:10,color:'var(--text-muted)'}},'START PPG'),
            h('div',{className:'mono',style:{fontSize:20,fontWeight:800,color:'var(--accent-cyan)'}},totalPPG.toFixed(1))
          ),
          h('div',{style:{textAlign:'center'}},
            h('div',{style:{fontSize:10,color:'var(--text-muted)'}},'TOTAL PAR'),
            h('div',{className:'mono',style:{fontSize:20,fontWeight:800,color:'var(--accent-green)'}},totalPAR.toFixed(1))
          ),
          h('div',{style:{textAlign:'center'}},
            h('div',{style:{fontSize:10,color:'var(--text-muted)'}},'TOTAL VAL'),
            h('div',{className:'mono',style:{fontSize:20,fontWeight:800}},totalVal.toLocaleString())
          )
        )
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'38px 1fr 36px 36px 36px',padding:'4px 0',fontSize:10,fontWeight:600,color:'var(--text-muted)',borderBottom:'1px solid var(--border)'}},
        h('span',null,'SLOT'),h('span',null,'PLAYER'),h('span',{style:{textAlign:'right'}},'PPG'),h('span',{style:{textAlign:'right'}},'PAR'),h('span',{style:{textAlign:'right'}},'RANK')),
      rows,
      h('div',{style:{display:'grid',gridTemplateColumns:'38px 1fr 36px 36px 36px',padding:'6px 0',fontSize:12,fontWeight:700,borderTop:'2px solid var(--border)'}},
        h('span',null,''),h('span',null,'TOTAL'),
        h('span',{className:'mono',style:{textAlign:'right',color:'var(--accent-cyan)'}},totalPPG.toFixed(1)),
        h('span',{className:'mono',style:{textAlign:'right',color:'var(--accent-green)'}},totalPAR.toFixed(1)),
        h('span',null,''))
    );
  }

  return h('div',null,
    h('h3',{style:{fontSize:16,marginBottom:12}},'Team Comparison'),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}},
      h('select',{style:{padding:'10px 14px',background:'var(--bg-secondary)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text-primary)',fontSize:14,fontFamily:'Outfit',outline:'none'},
        value:teamA,onChange:function(e){setTeamA(e.target.value);}},teamOptions),
      h('select',{style:{padding:'10px 14px',background:'var(--bg-secondary)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text-primary)',fontSize:14,fontFamily:'Outfit',outline:'none'},
        value:teamB,onChange:function(e){setTeamB(e.target.value);}},teamOptions)
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
      renderTeamColumn(tA),
      renderTeamColumn(tB)
    )
  );
}

function KTCEdge(props){
  var teamData = props.teamData;
  var selTeam = useState(''); var selectedTeam = selTeam[0]; var setSelectedTeam = selTeam[1];
  var sortMode = useState('overvalued'); var sortBy = sortMode[0]; var setSortBy = sortMode[1];

  // Compute positional rank edge
  var edgePlayers = useMemo(function(){
    var matched = processedPlayers.filter(function(p){return KTC_DATA[p.name];}).map(function(p){
      var ktc = KTC_DATA[p.name];
      return {name:p.name,pos:p.pos,team:p.team,age:p.age,modelVal:p.val,modelRank:p.rank,
        ktcVal:ktc.v,ktcRank:ktc.r,ktcPos:ktc.p,ppg:p.ppg,tier:p.tier};
    });
    var byPos = {QB:[],RB:[],WR:[],TE:[]};
    matched.forEach(function(p){if(byPos[p.pos]) byPos[p.pos].push(p);});
    Object.keys(byPos).forEach(function(pos){
      byPos[pos].sort(function(a,b){return b.modelVal-a.modelVal;});
      byPos[pos].forEach(function(p,i){p.modelPosRank=i+1;});
    });
    var ktcByPos = {QB:[],RB:[],WR:[],TE:[]};
    matched.forEach(function(p){if(ktcByPos[p.pos]) ktcByPos[p.pos].push(p);});
    Object.keys(ktcByPos).forEach(function(pos){
      ktcByPos[pos].sort(function(a,b){return b.ktcVal-a.ktcVal;});
      ktcByPos[pos].forEach(function(p,i){p.ktcPosRank=i+1;});
    });
    matched.forEach(function(p){
      p.edge = (p.ktcPosRank||0) - (p.modelPosRank||0);
      // Sell window + edge flag
      var sw = SELL_WINDOWS[p.pos];
      p.sellAlert = sw && p.age >= sw.start && p.edge < -3;
    });
    return matched;
  },[]);

  function findOwner(playerName){
    if(!teamData) return null;
    for(var i=0;i<teamData.length;i++){
      var t=teamData[i];
      for(var j=0;j<t.rosterPlayers.length;j++){

    else if(sortBy==='sellwindow') list = list.filter(function(p){return p.sellAlert;}).sort(function(a,b){return a.edge-b.edge;});

// ============================================================
// ROSTER OPTIMIZER - scan all opponents for best trade
// ============================================================
function RosterOptimizer(props){
  var teamData = props.teamData;
  var selTeam = useState(''); var myTeam = selTeam[0]; var setMyTeam = selTeam[1];
  var optMode = useState('valDelta'); var mode = optMode[0]; var setMode = optMode[1];
  var optExcl = useState({}); var excl = optExcl[0]; var setExcl = optExcl[1];
  var optResults = useState(null); var results = optResults[0]; var setResults = optResults[1];
  var optLoading = useState(false); var loading = optLoading[0]; var setLoading = optLoading[1];

  if(!teamData||!teamData.length) return h('div',{style:{padding:40,textAlign:'center',color:'var(--text-muted)'}},'Load league data in the League tab first');
  var teamOptions = [h('option',{key:'_',value:''},'Select your team...')].concat(teamData.map(function(t){return h('option',{key:t.teamName,value:t.teamName},t.teamName);}));
  var myData = teamData.find(function(t){return t.teamName===myTeam;});

  function getKtcV(p){var k=KTC_DATA[p.name];return k?k.v:0;}
  var KTC_MAX=9999;
  function rawAdj(pv,tv){return pv*(0.1+0.088*Math.pow(pv/KTC_MAX,8)+0.156*Math.pow(pv/Math.max(tv,pv),1.3)+0.08*Math.pow(pv/(KTC_MAX+2000),1.28));}
  function ktcFair(give,get){
    var all=give.concat(get);var tv=0;all.forEach(function(p){var kv=getKtcV(p);if(kv>tv)tv=kv;});
    if(!tv)return{diff:0,even:0};
    var a=give.reduce(function(s,p){return s+rawAdj(getKtcV(p),tv);},0);
    var b=get.reduce(function(s,p){return s+rawAdj(getKtcV(p),tv);},0);
    var d=a-b;var lo=0,hi=KTC_MAX;
    for(var i=0;i<40;i++){var m=(lo+hi)/2;if(rawAdj(m,tv)<Math.abs(d))lo=m;else hi=m;}
    return{diff:d,even:Math.round((lo+hi)/2)};
  }

  function runOptimizer(){
    if(!myData) return;
    setLoading(true);
    setTimeout(function(){
      var poolA = myData.rosterPlayers.filter(function(p){return p.val>20 && p.pos && !excl[p.name];});
      var beforeL = buildOptimalLineup(myData.rosterPlayers);
      var beforePPG = beforeL.starterPPG;
      var beforePAR = beforeL.starters.reduce(function(s,p){return s+getPlayerPAR(p);},0);
      var allResults = [];
      teamData.forEach(function(opp){
        if(opp.teamName===myTeam) return;
        var poolB = opp.rosterPlayers.filter(function(p){return p.val>20 && p.pos;});
        function tryT(give,get){
          var gv=give.reduce(function(s,p){return s+p.val;},0);
          var rv=get.reduce(function(s,p){return s+p.val;},0);
          if(rv-gv<=0) return;
          var kf=ktcFair(give,get);

// ============================================================
function WinProbability(props){
  var teamData = props.teamData;
  if(!teamData||!teamData.length) return h('div',{style:{padding:40,textAlign:'center',color:'var(--text-muted)'}},'Load league data in the League tab first');

  // Simulate season: each team's weekly score = starterPPG + noise
  // Use PPG variance proxy: higher PPG = higher variance
  var simState = useState(null); var sims = simState[0]; var setSims = simState[1];

  function runSim(){
    var N=10000; var teamStats={};
    teamData.forEach(function(t){
      // Per-team variance: calculate std dev of starter PPGs
      var ppgs=t.starters.map(function(s){return s.ppg||0;});
      var mean=t.starterPPG/Math.max(ppgs.length,1);
      var variance=ppgs.reduce(function(s,p){return s+Math.pow(p-mean,2);},0)/Math.max(ppgs.length,1);
      var starterSD=Math.sqrt(variance);
      // Teams with concentrated production (high SD) have higher weekly variance
      // Base variance 12% + bonus from concentration
      var weeklySD=t.starterPPG*(0.10+0.04*(starterSD/Math.max(mean,1)));
      teamStats[t.teamName]={wins:0,titles:0,ppg:t.starterPPG,par:t.starterPAR||0,sd:weeklySD};
    });
    var teams=teamData.map(function(t){return t.teamName;});
    for(var s=0;s<N;s++){
      var records={};teams.forEach(function(t){records[t]={w:0,pts:0};});
      for(var wk=0;wk<14;wk++){
        var shuffled=teams.slice();for(var si=shuffled.length-1;si>0;si--){var sj=Math.floor(Math.random()*(si+1));var tmp=shuffled[si];shuffled[si]=shuffled[sj];shuffled[sj]=tmp;}
        for(var mi=0;mi<Math.floor(shuffled.length/2);mi++){
          var tA=shuffled[mi*2];var tB=shuffled[mi*2+1];
          var ppgA=teamStats[tA].ppg;var ppgB=teamStats[tB].ppg;
          var sdA=teamStats[tA].sd;var sdB=teamStats[tB].sd;
          var u1=Math.random();var u2=Math.random();var z=Math.sqrt(-2*Math.log(u1))*Math.cos(2*Math.PI*u2);
          var scoreA=ppgA+z*sdA;
          u1=Math.random();u2=Math.random();z=Math.sqrt(-2*Math.log(u1))*Math.cos(2*Math.PI*u2);
          var scoreB=ppgB+z*sdB;
          records[tA].pts+=scoreA;records[tB].pts+=scoreB;
          if(scoreA>scoreB)records[tA].w++;else if(scoreB>scoreA)records[tB].w++;else{records[tA].w+=0.5;records[tB].w+=0.5;}
        }
      }
      // Top 6 make playoffs by wins (tiebreak: points)
      var standing=teams.slice().sort(function(a,b){return records[b].w-records[a].w||(records[b].pts-records[a].pts);});
      var playoff=standing.slice(0,6);
      // Simulate single-elim: 3v6, 4v5 → winners vs 1,2 → final
      function simGame(tA,tB){
        var pA=teamStats[tA].ppg;var pB=teamStats[tB].ppg;
        var u1=Math.random(),u2=Math.random(),z=Math.sqrt(-2*Math.log(u1))*Math.cos(2*Math.PI*u2);
        var sA=pA+z*pA*0.18;u1=Math.random();u2=Math.random();z=Math.sqrt(-2*Math.log(u1))*Math.cos(2*Math.PI*u2);
        var sB=pB+z*pB*0.18;return sA>sB?tA:tB;
      }
      var w1=simGame(playoff[2],playoff[5]);var w2=simGame(playoff[3],playoff[4]);
      var w3=simGame(playoff[0],w1);var w4=simGame(playoff[1],w2);
      var champ=simGame(w3,w4);
      playoff.forEach(function(t){teamStats[t].wins++;});
      teamStats[champ].titles++;
    }
    var result=teams.map(function(t){return{name:t,ppg:teamStats[t].ppg,par:teamStats[t].par,playoffPct:(teamStats[t].wins/N*100),champPct:(teamStats[t].titles/N*100)};});
    result.sort(function(a,b){return b.champPct-a.champPct;});
    setSims(result);
  }

  return h('div',null,
    h('h3',{style:{fontSize:16,marginBottom:8}},'\uD83C\uDFC6 Win Probability Model'),
    h('div',{style:{fontSize:12,color:'var(--text-muted)',marginBottom:12}},'Monte Carlo simulation: 10,000 seasons with weekly variance based on starter PPG'),
    h('button',{style:{padding:'8px 20px',background:'var(--accent-cyan)',color:'#000',border:'none',borderRadius:6,fontWeight:700,fontSize:13,cursor:'pointer',marginBottom:16},onClick:runSim},'Run 10,000 Simulations'),
    sims?h('div',{style:{background:'var(--bg-secondary)',borderRadius:10,padding:16,border:'1px solid var(--border)'}},
      h('div',{style:{display:'grid',gridTemplateColumns:'28px 1fr 60px 60px 80px 80px',padding:'4px 8px',fontSize:10,fontWeight:600,color:'var(--text-muted)',borderBottom:'1px solid var(--border)'}},
        h('span',null,'#'),h('span',null,'TEAM'),h('span',{style:{textAlign:'right'}},'PPG'),h('span',{style:{textAlign:'right'}},'PAR'),h('span',{style:{textAlign:'right'}},'PLAYOFF %'),h('span',{style:{textAlign:'right'}},'CHAMP %')),
      sims.map(function(t,i){
        var champBar = Math.min(100,t.champPct*5);
        return h('div',{key:t.name,style:{display:'grid',gridTemplateColumns:'28px 1fr 60px 60px 80px 80px',padding:'8px',fontSize:12,borderBottom:'1px solid var(--border)',alignItems:'center'}},
          h('span',{style:{fontWeight:700,color:'var(--text-muted)'}},i+1),
          h('span',{style:{fontWeight:600}},t.name),
          h('span',{className:'mono',style:{textAlign:'right',color:'var(--accent-cyan)'}},t.ppg.toFixed(1)),
          h('span',{className:'mono',style:{textAlign:'right',color:'var(--accent-green)'}},t.par.toFixed(1)),
          h('span',{style:{textAlign:'right'}},
            h('div',{style:{display:'flex',alignItems:'center',justifyContent:'flex-end',gap:6}},
              h('div',{style:{width:50,height:8,background:'var(--bg-tertiary)',borderRadius:4,overflow:'hidden'}},
                h('div',{style:{height:'100%',width:t.playoffPct+'%',background:'var(--accent-cyan)',borderRadius:4}})),
              h('span',{className:'mono',style:{fontSize:11,minWidth:36}},t.playoffPct.toFixed(1)+'%'))
          ),
          h('span',{style:{textAlign:'right'}},
            h('div',{style:{display:'flex',alignItems:'center',justifyContent:'flex-end',gap:6}},
              h('div',{style:{width:50,height:8,background:'var(--bg-tertiary)',borderRadius:4,overflow:'hidden'}},
                h('div',{style:{height:'100%',width:champBar+'%',background:'var(--accent-gold)',borderRadius:4}})),
              h('span',{className:'mono',style:{fontSize:11,fontWeight:700,minWidth:36}},t.champPct.toFixed(1)+'%'))
          )
        );
      })
    ):null
  );
}

function SellHighAlerts(props){
  var teamData = props.teamData;

  if(!teamData||!teamData.length) return h('div',{style:{padding:40,textAlign:'center',color:'var(--text-muted)'}},'Load league data in the League tab first');

  var myData = teamData.find(function(t){return t.teamName===myTeam;});

  // For each player on roster, compute sell-high score
  // Factors: age vs peak curve, KTC overvalue, career trajectory
  var alerts = [];
  if(myData){
    myData.rosterPlayers.forEach(function(p){
      if(!p.pos||!p.matched||p.val<30) return;
      var ktc=KTC_DATA[p.name];if(!ktc) return;
      var curve=AGING_CURVES[p.pos];if(!curve) return;
      var age=p.age||0;if(!age) return;
      var peakAge = p.pos==='QB'?32:p.pos==='RB'?21:p.pos==='WR'?25:25;
      var yearsFromPeak = age - peakAge;
      var currentCurve = curve[age]||0;
      var nextYearCurve = curve[age+1]||0;
      var declineRate = currentCurve>0?(currentCurve-nextYearCurve)/currentCurve:0;

      // KTC positional rank vs model positional rank
      var mpr=processedPlayers.filter(function(pp){return pp.pos===p.pos&&pp.val>(p.val||0);}).length+1;
      var kpl=Object.keys(KTC_DATA).filter(function(k){return KTC_DATA[k].p===p.pos;}).sort(function(a,b){return KTC_DATA[b].v-KTC_DATA[a].v;});
      var kpr=kpl.indexOf(p.name)+1;
      var rankEdge = kpr>0?(kpr-mpr):0; // positive = KTC overvalues

      // Sell-high score: higher = more reason to sell
      var sellScore = 0;
      sellScore += Math.max(0,declineRate*100); // projected decline
      sellScore += Math.max(0,rankEdge*3); // KTC overvaluation
      sellScore += Math.max(0,yearsFromPeak*2); // past peak
      if(p.pos==='RB'&&age>=27) sellScore+=15; // RB cliff warning

        declineRate:declineRate,rankEdge:rankEdge,yearsFromPeak:yearsFromPeak});

  return h('div',null,

    h('div',{style:{fontSize:12,color:'var(--text-muted)',marginBottom:12}},'Players at peak perceived value relative to their projected trajectory'),

      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 40px 36px 50px 50px 50px 80px 50px',padding:'4px 8px',fontSize:9,fontWeight:600,color:'var(--text-muted)',borderBottom:'1px solid var(--border)',textTransform:'uppercase'}},
        h('span',null,'PLAYER'),h('span',null,'POS'),h('span',{style:{textAlign:'right'}},'AGE'),h('span',{style:{textAlign:'right'}},'MODEL'),h('span',{style:{textAlign:'right'}},'KTC'),h('span',{style:{textAlign:'right'}},'DECLINE'),h('span',{style:{textAlign:'center'}},'KTC EDGE'),h('span',{style:{textAlign:'center'}},'ACTION')),
      alerts.map(function(a){
        return h('div',{key:a.name,style:{display:'grid',gridTemplateColumns:'1fr 40px 36px 50px 50px 50px 80px 50px',padding:'6px 8px',fontSize:11,borderBottom:'1px solid var(--border)',alignItems:'center'}},

        leagueIds.push({id:lid,season:lg.season||'?'});

          fetch('https://api.sleeper.app/v1/league/'+lg.id+'/rosters').then(function(r){return r.json();}),

        ]).then(function(data){

          var name=(u&&u.metadata&&u.metadata.team_name)||(u&&u.display_name)||'Unknown';
          ownerNames[r.owner_id]=name; // later seasons overwrite earlier = current names win
        });

      var avgAgeSold=gm.ageSold.length?gm.ageSold.reduce(function(s,a){return s+a;},0)/gm.ageSold.length:0;
      gm.avgAgeBought=avgAgeBought;
      gm.avgAgeSold=avgAgeSold;
      gm.ageBias=avgAgeBought-avgAgeSold; // negative = buys younger
      gm.netPicks=gm.picksAcquired-gm.picksTraded;
      // Position bias: what they buy most vs sell most
      var maxBuy='';var maxBuyN=0;var maxSell='';var maxSellN=0;

        if(gm.posBought[pos]>maxBuyN){maxBuyN=gm.posBought[pos];maxBuy=pos;}

  },[trades,rMap,nflP]);

      var kpl=Object.keys(KTC_DATA).filter(function(k){return KTC_DATA[k].p===p.pos;}).sort(function(a,b){return KTC_DATA[b].v-KTC_DATA[a].v;});
      var kpr=kpl.indexOf(p.name)+1;
      if(kpr>0&&kpr-mpr<=-4) signals.push('Model says BUY \u2014 KTC undervalues by '+Math.abs(kpr-mpr)+' spots');
      if(kpr>0&&kpr-mpr>=4) signals.push('Model says SELL \u2014 they may overvalue by '+Math.abs(kpr-mpr)+' spots');
      if(signals.length>0) players.push({name:p.name,pos:p.pos,age:p.age,val:p.val,ktcVal:ktc.v,ppg:p.ppg||0,signals:signals});

  var gmList=gmProfiles?Object.values(gmProfiles).filter(function(g){return g.trades>0;}).sort(function(a,b){return b.trades-a.trades;}):[];

  return h('div',null,

              })

          // Exploitation guide
          gm.exploits.length>0?h('div',{style:{background:'var(--accent-gold)08',borderRadius:10,padding:16,border:'1px solid var(--accent-gold)33'}},
            h('h4',{style:{fontSize:14,fontWeight:700,color:'var(--accent-gold)',marginBottom:8}},'\u26A1 How to Exploit '+gm.name),
            gm.exploits.map(function(e,i){

          // Exploitable players on their roster
          exploitPlayers.length>0?h('div',{style:{background:'var(--bg-secondary)',borderRadius:10,padding:16,border:'1px solid var(--border)'}},
            h('h4',{style:{fontSize:14,fontWeight:700,marginBottom:8}},'\uD83C\uDFAF Target Players on '+gm.name+'\'s Roster'),

              h('span',null,'PLAYER'),h('span',null,'POS'),h('span',{style:{textAlign:'right'}},'AGE'),h('span',{style:{textAlign:'right'}},'MODEL'),h('span',{style:{textAlign:'right'}},'KTC'),h('span',null,'SIGNALS')),

// APP
// ============================================================
function App(){
  var tabState = useState('rankings'); var tab = tabState[0]; var setTab = tabState[1];
  var searchState = useState(''); var search = searchState[0]; var setSearch = searchState[1];
  var posState = useState('ALL'); var posFilter = posState[0]; var setPosFilter = posState[1];
  var sortState = useState('value'); var sortBy = sortState[0]; var setSortBy = sortState[1];
  var expState = useState(null); var expandedId = expState[0]; var setExpandedId = expState[1];
  var tdState = useState(null); var teamData = tdState[0]; var setTeamData = tdState[1];

  // KTC Refresh state
  var ktcStatusState = useState(''); var ktcStatus = ktcStatusState[0]; var setKtcStatus = ktcStatusState[1];
  var ktcModalState = useState(false); var showKtcModal = ktcModalState[0]; var setShowKtcModal = ktcModalState[1];
  var ktcPasteState = useState(''); var ktcPasteText = ktcPasteState[0]; var setKtcPasteText = ktcPasteState[1];
  var ktcVersionState = useState(0); var ktcVersion = ktcVersionState[0]; var setKtcVersion = ktcVersionState[1];

  function updateKtcData(newData){
    // Replace entries AND normalize names to match our player data
    var count = 0;
    var before = KTC_DATA['DJ Moore'] ? KTC_DATA['DJ Moore'].v : 'none';
    // Build a lookup of normalized names from existing KTC_DATA
    var existingNorm = {};
    Object.keys(KTC_DATA).forEach(function(k){ existingNorm[k.toLowerCase().replace(/[.']/g,'')] = k; });
    Object.keys(newData).forEach(function(name){
      // Direct match first
      KTC_DATA[name] = newData[name];
      count++;
      // Also try normalized match to update under existing key
      var norm = name.toLowerCase().replace(/[.']/g,'');
      if(existingNorm[norm] && existingNorm[norm] !== name){
        KTC_DATA[existingNorm[norm]] = newData[name];
      }
    });
    var after = KTC_DATA['DJ Moore'] ? KTC_DATA['DJ Moore'].v : 'none';
    console.log('[KTC] Updated '+count+' players. DJ Moore: '+before+' -> '+after);
    console.log('[KTC] First 5 names from KTC:', Object.keys(newData).slice(0,5));
    // Force full re-render
    setKtcVersion(function(v){return v+1;});
    setKtcStatus('\u2705 KTC live: '+count+' players');
    setTimeout(function(){setKtcStatus('');},8000);
  }

  // Parse KTC playersArray from raw HTML source
  function parseKtcHtml(html){
    var match = html.match(/var\s+playersArray\s*=\s*(\[[\s\S]*?\]);/);
    if(!match) return null;
    try {
      var arr = JSON.parse(match[1]);
      var newKtc = {};
      arr.forEach(function(p){
        var name = p.playerName || '';
        var sfv = p.superflexValues || {};
        var val = sfv.value || 0;
        var rank = sfv.rank || 0;
        var pos = (p.position || '').toUpperCase();
        if(name && val > 0 && (pos==='QB'||pos==='RB'||pos==='WR'||pos==='TE')){
          newKtc[name] = {v:val, r:rank, p:pos};
        }
      });
      return Object.keys(newKtc).length > 50 ? newKtc : null;
    } catch(e){ return null; }
  }

  function fetchKtcFromAPI(){
    setKtcStatus('Fetching KTC data...');
    var ktcUrl = 'https://keeptradecut.com/dynasty-rankings?filters=QB|WR|RB|TE|RDP&format=2';
    var attempts = [
      {url:'https://api.allorigins.win/raw?url='+encodeURIComponent(ktcUrl), type:'raw'},
      {url:'https://api.allorigins.win/get?url='+encodeURIComponent(ktcUrl), type:'json'},
      {url:'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(ktcUrl), type:'raw'},
      {url:'https://everyorigin.jwvbremen.nl/api/get?url='+encodeURIComponent(ktcUrl), type:'everyorigin'}
    ];
    var tried = 0;
    function tryNext(){
      if(tried >= attempts.length){
        setKtcStatus('Auto-fetch failed \u2014 use Paste KTC');
        console.log('[KTC] All proxies failed');
        return;
      }
      var a = attempts[tried];
      console.log('[KTC] Trying proxy #'+tried+'...');
      fetch(a.url).then(function(r){
        if(!r.ok) throw new Error('HTTP '+r.status);
        if(a.type==='json' || a.type==='everyorigin') return r.json();
        return r.text();
      }).then(function(data){
        var html = data;
        if(a.type==='json' && data && data.contents) html = data.contents;
        if(a.type==='everyorigin' && data && data.html) html = data.html;
        if(typeof html !== 'string') throw new Error('No HTML');
        var parsed = parseKtcHtml(html);
        if(parsed){
          updateKtcData(parsed);
          setKtcStatus('\u2705 KTC live: '+Object.keys(parsed).length+' players');
          setTimeout(function(){setKtcStatus('');},8000);
        } else {
          throw new Error('Could not parse playersArray from HTML');
        }
      }).catch(function(e){
        console.log('[KTC] Proxy #'+tried+' failed:', e.message);
        tried++;
        tryNext();
      });
    }
    tryNext();
  }

  function parseKtcPaste(text){
    // First: parse as raw HTML containing playersArray
    var htmlParsed = parseKtcHtml(text);
    if(htmlParsed){
      updateKtcData(htmlParsed);
      setKtcStatus('\u2705 KTC updated: '+Object.keys(htmlParsed).length+' players');
      setTimeout(function(){setKtcStatus('');},8000);
      setShowKtcModal(false);
      setKtcPasteText('');
      return;
    }
    // Second: parse as raw JSON array (just the playersArray content)
    try {
      var trimmed = text.trim();
      if(trimmed.charAt(0)==='['){
        var arr = JSON.parse(trimmed);
        var newKtc = {};
        arr.forEach(function(p){
          var name = p.playerName || '';
          var sfv = p.superflexValues || {};
          var val = sfv.value || 0;
          var rank = sfv.rank || 0;
          var pos = (p.position || '').toUpperCase();
          if(name && val > 0) newKtc[name] = {v:val, r:rank, p:pos};
        });
        if(Object.keys(newKtc).length > 50){
          updateKtcData(newKtc);
          setKtcStatus('\u2705 KTC updated: '+Object.keys(newKtc).length+' players');
          setTimeout(function(){setKtcStatus('');},8000);
          setShowKtcModal(false);
          setKtcPasteText('');
          return;
        }
      }
    } catch(e){}
    // Third: line-by-line text parsing (legacy)
    var lines = text.split('\n').map(function(l){return l.trim();}).filter(Boolean);
    var newKtc = {};
    var rank = 0;
    lines.forEach(function(line){
      var m1 = line.match(/^(\d+)[.\s]+([A-Za-z][\w\s'.&;-]+?)\s+(QB|RB|WR|TE)\s+(\w+)\s+(\d{3,5})/i);
      if(m1){
        rank++;
        var name = m1[2].trim().replace(/&apos;/g,"'").replace(/&#x27;/g,"'");
        newKtc[name] = {v:parseInt(m1[5]),r:rank,p:m1[3].toUpperCase()};
        return;
      }
      var parts = line.split('\t');
      if(parts.length >= 3){
        var nameP = parts[0].trim();
        var valP = parts[parts.length-1].trim();
        var posP = '';
        for(var pi=1;pi<parts.length;pi++){
          if(/^(QB|RB|WR|TE)$/i.test(parts[pi].trim())){posP=parts[pi].trim().toUpperCase();break;}
        }
        if(nameP && /^\d{3,5}$/.test(valP) && nameP.length > 3){
          rank++;
          newKtc[nameP.replace(/&apos;/g,"'").replace(/&#x27;/g,"'")] = {v:parseInt(valP),r:rank,p:posP};
          return;
        }
      }
      var m4 = line.match(/^([A-Za-z][\w\s'.&;-]{3,}?)\s+(\d{3,5})$/);
      if(m4){
        rank++;
        newKtc[m4[1].trim().replace(/&apos;/g,"'").replace(/&#x27;/g,"'")] = {v:parseInt(m4[2]),r:rank,p:''};
      }
    });
    if(Object.keys(newKtc).length > 10){
      updateKtcData(newKtc);
      setShowKtcModal(false);
      setKtcPasteText('');
    } else {
      setKtcStatus('Could not parse \u2014 found only '+Object.keys(newKtc).length+' players. Try pasting the full page source (Ctrl+U on KTC page).');
    }
  }

  // Auto-fetch KTC values on app load (works when served from localhost)
  useEffect(function(){
    if(window.location.protocol !== 'file:'){
      fetchKtcFromAPI();
    }
  },[]);

  var filtered = useMemo(function(){
    var list = posFilter==='PICK' ? DRAFT_PICKS.slice() : processedPlayers.slice().concat(posFilter==='ALL'?DRAFT_PICKS:[]);
    if(posFilter!=='ALL'&&posFilter!=='PICK') list=list.filter(function(p){return p.pos===posFilter;});
    if(search) list=list.filter(function(p){return p.name.toLowerCase().indexOf(search.toLowerCase())>=0||(p.team&&p.team.toLowerCase().indexOf(search.toLowerCase())>=0);});
    if(sortBy==='age') list.sort(function(a,b){return (a.age||99)-(b.age||99);});
    else if(sortBy==='ppg') list.sort(function(a,b){return (b.ppg||0)-(a.ppg||0);});
    else if(sortBy==='name') list.sort(function(a,b){return a.name.localeCompare(b.name);});
    else list.sort(function(a,b){return b.val-a.val;});
    return list;
  },[posFilter,search,sortBy,ktcVersion]);

  var tabs = [{id:'rankings',label:'Rankings'},{id:'trade',label:'Trade Calc'},{id:'threeway',label:'3-Way'},{id:'league',label:'League'},{id:'compare',label:'Compare'},{id:'optimizer',label:'Optimizer'},{id:'winprob',label:'Win Prob'},{id:'gm',label:'GM Intel'},{id:'analysis',label:'Analysis'},{id:'sellhigh',label:'Sell High'},{id:'waivers',label:'Waivers'},{id:'ktc',label:'Market Edge'},{id:'scarcity',label:'Scarcity'}];
  var tabButtons = tabs.map(function(t){
    return h('button',{key:t.id,className:'nav-tab'+(tab===t.id?' active':''),onClick:function(){setTab(t.id);}},t.label);
  });

  var posButtons = ['ALL','QB','RB','WR','TE','PICK'].map(function(pos){
    return h('button',{key:pos,className:'pos-btn'+(posFilter===pos?' active':''),'data-pos':pos,onClick:function(){setPosFilter(pos);}},pos);
  });

  var tableHeader = h('div',{className:'table-header'},
    h('div',null,'#'),h('div',null,'PLAYER'),h('div',null,'POS'),h('div',null,'VALUE'),
    h('div',null,'KTC'),h('div',null,'TIER'),h('div',null,'PPG'),h('div',null,'EYR'),h('div',null,'SYR'),h('div',null,'EDGE'),h('div',null)
  );

  var playerRows = filtered.map(function(p){
    return h(PlayerRow,{key:p.name+(p._id||''),p:p,ktcV:ktcVersion,expanded:expandedId===p.name,onToggle:function(){setExpandedId(expandedId===p.name?null:p.name);}});
  });

  var controls = tab==='rankings' ? h('div',{className:'controls-row'},
    h('div',{className:'search-box'},h(SearchIcon),h('input',{placeholder:'Search players...',value:search,onChange:function(e){setSearch(e.target.value);}})),
    h('div',{className:'pos-filters'},posButtons),
    h('select',{className:'sort-select',value:sortBy,onChange:function(e){setSortBy(e.target.value);}},
      h('option',{value:'value'},'Sort: Value'),h('option',{value:'ppg'},'Sort: PPG'),h('option',{value:'age'},'Sort: Age'),h('option',{value:'name'},'Sort: Name')
    ),
    h('div',{className:'player-count'},filtered.length+' players')
  ) : null;

  var content = null;
  if(tab==='rankings'){
    content = h('div',{className:'table-container'},tableHeader,playerRows,
      filtered.length===0 ? h('div',{className:'empty-state'},h('h3',null,'No players found'),h('p',null,'Try adjusting your search or filters')) : null
    );
  } else if(tab==='trade'){
    content = h(TradeCalculator,{players:processedPlayers,teamData:teamData});
  } else if(tab==='threeway'){
    content = h(ThreeWayTrade,{teamData:teamData});
  } else if(tab==='league'){
    content = h(LeagueView,{onTeamData:setTeamData});
  } else if(tab==='compare'){
    content = h(TeamComparison,{teamData:teamData});
  } else if(tab==='analysis'){
    content = h(TeamAnalysis,{teamData:teamData});
  } else if(tab==='optimizer'){
    content = h(RosterOptimizer,{teamData:teamData});
  } else if(tab==='winprob'){
    content = h(WinProbability,{teamData:teamData});
  } else if(tab==='gm'){
    content = h(GMAnalyzer,{teamData:teamData});
  } else if(tab==='sellhigh'){
    content = h(SellHighAlerts,{teamData:teamData});
  } else if(tab==='waivers'){
    content = h(WaiverWire,{teamData:teamData});
  } else if(tab==='ktc'){
    content = h(KTCEdge,{teamData:teamData});
  } else if(tab==='scarcity'){
    content = h(ScarcityViz,{players:processedPlayers});
  }

  return h('div',{className:'app-container',key:'app-ktc-'+ktcVersion},
    h('div',{className:'header'},
      h('div',{className:'header-top'},
        h('div',{className:'logo'},
          h('h1',null,'CALLOWAY VALUE INDEX'),
          h('span',{className:'league-tag'},'2QB \u00B7 HALF PPR \u00B7 4PT PASS TD \u00B7 10 TEAM')
        ),
        h('div',{style:{display:'flex',alignItems:'center',gap:8}},
          h('button',{style:{padding:'4px 10px',background:'var(--accent-gold)',color:'#000',border:'none',borderRadius:4,fontSize:10,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'},onClick:fetchKtcFromAPI},'\uD83D\uDD04 Refresh KTC'),
          h('button',{style:{padding:'4px 10px',background:'var(--bg-tertiary)',color:'var(--text-secondary)',border:'1px solid var(--border)',borderRadius:4,fontSize:10,cursor:'pointer',whiteSpace:'nowrap'},onClick:function(){setShowKtcModal(true);}},'Paste KTC'),
          ktcStatus?h('span',{style:{fontSize:10,color:'var(--accent-green)',whiteSpace:'nowrap'}},ktcStatus):null
        ),
        h('div',{className:'nav-tabs'},tabButtons)
      ),
      controls
    ),
    // KTC Paste Modal
    showKtcModal?h('div',{style:{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.7)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'},onClick:function(e){if(e.target===e.currentTarget)setShowKtcModal(false);}},
      h('div',{style:{background:'var(--bg-primary)',borderRadius:12,padding:24,width:'90%',maxWidth:600,maxHeight:'80vh',overflow:'auto',border:'1px solid var(--border)'}},
        h('h3',{style:{fontSize:16,marginBottom:8}},'Update KTC Values'),
        h('p',{style:{fontSize:12,color:'var(--text-muted)',marginBottom:12}},'KTC auto-fetches on load. If that fails, go to keeptradecut.com/dynasty-rankings, press Ctrl+U to view page source, copy everything (Ctrl+A, Ctrl+C), and paste below.'),
        h('textarea',{style:{width:'100%',height:200,background:'var(--bg-secondary)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text-primary)',fontSize:12,padding:12,fontFamily:'monospace',resize:'vertical'},
          placeholder:'Paste full page source from KTC here...\n\nThe app will find the playersArray data automatically.',
          value:ktcPasteText,onChange:function(e){setKtcPasteText(e.target.value);}}),
        h('div',{style:{display:'flex',gap:8,marginTop:12}},
          h('button',{style:{flex:1,padding:'10px',background:'var(--accent-cyan)',color:'#000',border:'none',borderRadius:6,fontWeight:700,fontSize:13,cursor:'pointer'},
            onClick:function(){parseKtcPaste(ktcPasteText);}},'Parse & Update'),
          h('button',{style:{flex:1,padding:'10px',background:'var(--bg-tertiary)',color:'var(--text-secondary)',border:'1px solid var(--border)',borderRadius:6,fontSize:13,cursor:'pointer'},
            onClick:function(){setShowKtcModal(false);setKtcPasteText('');}},'Cancel')
        ),
        ktcStatus?h('div',{style:{marginTop:8,fontSize:12,color:'var(--accent-gold)'}},ktcStatus):null
      )
    ):null,
    content,
    h('div',{style:{textAlign:'center',padding:'24px 0',fontSize:11,color:'var(--text-muted)'}},'Calloway Value Index v9 \u00B7 10yr Data + 2026 Projections \u00B7 Career Trajectory \u00B7 KTC Adjusted Trades')
  );
}

ReactDOM.render(h(App), document.getElementById('root'));


</script>
</body>
</html>
